{% extends 'base.html' %}
{% block content %}
<h4 class="mb-3">{{ _('Announcements') }}</h4>
<div class="list-group">
  {% for a in anns %}
  <div class="list-group-item">
    <div class="d-flex justify-content-between gap-3">
      <div class="fw-semibold flex-grow-1">{{ a.title|safe }}</div>
      <span class="small text-muted text-nowrap">{{ a.starts_at|dt }}</span>
    </div>
    <div>{{ a.body|safe }}</div>
  </div>
  {% else %}
  <div class="text-muted">{{ _('Nothing here yet. Check back soon.') }}</div>
  {% endfor %}
</div>
{% endblock %}
