{% extends 'base.html' %}
{% from '_csrf.html' import csrf %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5 col-xl-4">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{ _('Reset Your Password') }}</h5>
        <p class="text-muted">{{ _('Enter the email associated with your staff account and we\'ll send a reset link if we find a match.') }}</p>
        <form method="post" novalidate>
          {{ csrf() }}
          <div class="mb-3">
            <label class="form-label" for="email">{{ _('Email address') }}</label>
            <input class="form-control" type="email" id="email" name="email" placeholder="name@example.org" value="{{ email|default('') }}" required>
          </div>
          <button class="btn btn-primary w-100">{{ _('Send reset link') }}</button>
        </form>
        <div class="mt-3 text-center">
          <a href="{{ url_for('login') }}">{{ _('Back to login') }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
