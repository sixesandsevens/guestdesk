{% extends 'base.html' %}
{% import '_macros.html' as m %}
{% from '_csrf.html' import csrf %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">{{ _('Sign Up') }}</h5>
        <form method="post">
          {{ csrf() }}
          <div class="mb-2">
            <label class="form-label">{{ _('Username') }}</label>
            <input class="form-control" name="username" placeholder="{{ _('Username') }}" value="{{ form.username|default('') }}">
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _('Password') }}</label>
            <input class="form-control" type="password" name="password" placeholder="{{ _('Password') }}">
          </div>
          <button class="btn btn-primary w-100">{{ _('Sign Up') }}</button>
        </form>
        <div class="mt-2 text-center">
          <a href="{{ url_for('login') }}">{{ _('Already have an account? Log in') }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
