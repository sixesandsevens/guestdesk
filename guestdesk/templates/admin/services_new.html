{% extends 'base.html' %}
{% import '_macros.html' as m %}
{% from '_csrf.html' import csrf %}

{% block content %}
<h4 class="mb-3">New Service</h4>
<form method="post">
  {{ csrf() }}
  <div class="row g-2">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <input name="name" class="form-control" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Category</label>
      <select name="category" class="form-select">
        {% for c in ['Food','Showers','Laundry','Mail','ID/Docs','Medical','Mental Health','Legal','Employment','Transportation','Other'] %}
          <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="row g-2 mt-1">
    <div class="col-md-6">
      <label class="form-label">Availability</label>
      <select class="form-select" name="availability">
        <option value="scheduled" selected>Scheduled (has posted times)</option>
        <option value="on_call">On call / responds to requests</option>
        <option value="by_appt">By appointment</option>
        <option value="hotline">Hotline / 24×7 phone</option>
      </select>
    </div>
    <div class="col-md-6 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="is_offsite" name="is_offsite" value="1">
        <label class="form-check-label" for="is_offsite">Off-site / phone-only / mobile unit</label>
      </div>
    </div>
  </div>
  <div class="mb-2">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="5"></textarea>
  </div>
  <div class="row g-2">
    <div class="col-md-4">
      <label class="form-label">Location</label>
      <input name="location" class="form-control">
    </div>
    <div class="col-md-4">
      <label class="form-label">Contact</label>
      <input name="contact" class="form-control">
    </div>
    <div class="col-md-4">
      <label class="form-label">External Link</label>
      <input name="external_link" class="form-control" placeholder="http(s)://">
    </div>
  </div>
  <div class="mb-2">
    <label class="form-label">Schedule Note (optional)</label>
    <input name="schedule_note" class="form-control" placeholder="e.g., 'Mon/Wed 9–11 at Big House'">
  </div>
  <button class="btn btn-primary">Create</button>
</form>
{% endblock %}
