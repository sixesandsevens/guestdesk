{% extends 'base.html' %}
{% import '_macros.html' as m %}
{% from '_csrf.html' import csrf %}

{% block content %}
<h4 class="mb-3">Edit Service</h4>
<form method="post">
  {{ csrf() }}
  <div class="row g-2">
    <div class="col-md-6">
      <label class="form-label">Name</label>
      <input name="name" class="form-control" required value="{{ service.name }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Category</label>
      <select name="category" class="form-select">
        {% for c in ['Food','Showers','Laundry','Mail','ID/Docs','Medical','Mental Health','Legal','Employment','Transportation','Other'] %}
          <option value="{{ c }}" {{ 'selected' if service.category==c }}>{{ c }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="row g-2 mt-1">
    <div class="col-md-6">
      <label class="form-label">Availability</label>
      {% set a = service.availability or 'scheduled' %}
      <select class="form-select" name="availability">
        <option value="scheduled" {{ 'selected' if a=='scheduled' }}>Scheduled (has posted times)</option>
        <option value="on_call"   {{ 'selected' if a=='on_call' }}>On call / responds to requests</option>
        <option value="by_appt"   {{ 'selected' if a=='by_appt' }}>By appointment</option>
        <option value="hotline"   {{ 'selected' if a=='hotline' }}>Hotline / 24×7 phone</option>
      </select>
    </div>
    <div class="col-md-6 d-flex align-items-end">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="is_offsite" name="is_offsite" value="1" {{ 'checked' if service.is_offsite }}>
        <label class="form-check-label" for="is_offsite">Off-site / phone-only / mobile unit</label>
      </div>
    </div>
  </div>

  <div class="mb-2 mt-2">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="5">{{ service.description }}</textarea>
  </div>
  <div class="row g-2">
    <div class="col-md-4">
      <label class="form-label">Location</label>
      <input name="location" class="form-control" value="{{ service.location }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Contact</label>
      <input name="contact" class="form-control" value="{{ service.contact }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">External Link</label>
      <input name="external_link" class="form-control" placeholder="http(s)://" value="{{ service.external_link }}">
    </div>
  </div>
  <div class="mb-2">
    <label class="form-label">Schedule Note (optional)</label>
    <input name="schedule_note" class="form-control" placeholder="e.g., 'Mon/Wed 9–11 at Big House'" value="{{ service.schedule_note }}">
  </div>
  <button class="btn btn-primary">Save Changes</button>
  <a class="btn btn-outline-secondary" href="{{ url_for('admin_services') }}">Cancel</a>
  <a class="btn btn-outline-secondary" href="{{ url_for('admin_slots', sid=service.id) }}">Manage Slots</a>
  <a class="btn btn-outline-danger" href="#" onclick="if(confirm('Delete this service?')){ document.getElementById('del').submit(); } return false;">Delete</a>
  <form id="del" method="post" action="{{ url_for('admin_services_delete', sid=service.id) }}">{{ csrf() }}</form>
</form>
{% endblock %}
